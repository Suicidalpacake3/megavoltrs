{% extends 'base.html' %}{% block content %}
<h1>Jobs</h1>
<form method="get" class="search">
  <input name="q" value="{{q}}" placeholder="Search job#, client, device...">
  <select name="status">
    <option value="">All Statuses</option>
    {% for s in ['Received','Awaiting Approval','Approved','Quotation','Report','In Repair','No Fault Found','Do Not Repair','Unrepairable','Ready for Collection','Completed','Collected','Recall','Dispose'] %}
    <option value="{{s}}" {% if status==s %}selected{% endif %}>{{s}}</option>
    {% endfor %}
  </select>
  <button>Filter</button>
</form>
<table>
<tr><th>Job #</th><th>Client</th><th>Device</th><th>Issue</th><th>Status</th><th>Date In</th></tr>
{% for j in jobs %}
<tr>
  <td><a href="{{url_for('job_detail',jid=j.id)}}">{{j.job_number}}</a></td>
  <td>{{j.name}}</td>
  <td>{{j.device_type}} {{j.brand}}</td>
  <td>{{j.issue}}</td>
  <td><span class="status {{j.status}}">{{j.status}}</span></td>
  <td>{{j.date_in}}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
